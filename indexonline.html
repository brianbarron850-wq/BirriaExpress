<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Birria Express · Control de Restaurante</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Figtree:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6EEDD;
  --bg-alt:#EFE1C3;
  --paper:#FFFCF5;
  --ink:#2B1B12;
  --ink-soft:#5B4636;
  --brick:#A23A1B;
  --brick-dark:#7A2911;
  --ember:#D9832E;
  --corn:#E3B23C;
  --cilantro:#4C7A3B;
  --cilantro-dark:#375B2B;
  --danger:#B3261E;
  --masa:#E8D2A0;
  --line:#DCC79E;
  --shadow: 0 6px 18px rgba(90,45,15,.12);
  --radius: 14px;
  font-family: 'Figtree', system-ui, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:
    radial-gradient(circle at 100% 0%, rgba(217,131,46,.10), transparent 40%),
    var(--bg);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Fraunces', serif; font-weight:600; margin:0 0 4px;}
.mono{font-family:'IBM Plex Mono', monospace;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:inherit;}
::selection{background:var(--corn); color:var(--ink);}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:10px 16px; border-radius:10px; border:1.5px solid transparent;
  font-weight:600; font-size:14px; transition:.15s transform, .15s box-shadow, .15s background;
  background:var(--paper); color:var(--ink); border-color:var(--line);
}
.btn:hover{transform:translateY(-1px); box-shadow:var(--shadow);}
.btn:active{transform:translateY(0);}
.btn-primary{background:var(--brick); border-color:var(--brick); color:#fff;}
.btn-primary:hover{background:var(--brick-dark);}
.btn-success{background:var(--cilantro); border-color:var(--cilantro); color:#fff;}
.btn-success:hover{background:var(--cilantro-dark);}
.btn-warn{background:var(--corn); border-color:var(--corn); color:#3a2a06;}
.btn-danger{background:transparent; border-color:var(--danger); color:var(--danger);}
.btn-danger:hover{background:var(--danger); color:#fff;}
.btn-ghost{background:transparent; border-color:transparent; color:var(--ink-soft);}
.btn-sm{padding:6px 10px; font-size:12.5px; border-radius:8px;}
.btn-block{width:100%;}
.btn:disabled{opacity:.4; cursor:not-allowed; transform:none;}

/* ---------- Layout ---------- */
#loginScreen{
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
}
.login-card{
  width:100%; max-width:380px; background:var(--paper); border:1.5px solid var(--line);
  border-radius:20px; padding:36px 30px; box-shadow:var(--shadow); text-align:center;
}
.login-card .logo{
  width:64px; height:64px; border-radius:16px; background:var(--brick); color:#fff;
  display:flex; align-items:center; justify-content:center; font-size:30px; margin:0 auto 14px;
  box-shadow: inset 0 -6px 0 rgba(0,0,0,.15);
}
.login-card h1{font-size:26px;}
.login-card p.tag{color:var(--ink-soft); margin-bottom:22px; font-size:13.5px;}
.field{text-align:left; margin-bottom:14px;}
.field label{display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em;}
.field input, .field select, .field textarea{
  width:100%; padding:11px 12px; border-radius:10px; border:1.5px solid var(--line);
  background:#fff; font-size:15px; color:var(--ink);
}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--ember); outline-offset:1px;}
.login-error{color:var(--danger); font-size:13px; margin-bottom:10px; min-height:16px; font-weight:600;}
.login-hint{margin-top:16px; font-size:12px; color:var(--ink-soft); background:var(--bg-alt); padding:10px; border-radius:10px;}

.app-shell{display:flex; min-height:100vh;}
.sidebar{
  width:220px; flex-shrink:0; background:var(--brick); color:#fdece0; padding:20px 14px;
  display:flex; flex-direction:column; gap:4px; position:sticky; top:0; height:100vh;
}
.sidebar .brand{display:flex; align-items:center; gap:10px; padding:6px 8px 20px;}
.sidebar .brand .logo{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:18px;}
.sidebar .brand strong{font-family:'Fraunces',serif; font-size:16px; display:block;}
.sidebar .brand span{font-size:11px; opacity:.75;}
.navbtn{
  display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:10px;
  background:transparent; color:#fdece0e0; border:none; text-align:left; font-size:14.5px; font-weight:600;
}
.navbtn .ic{font-size:17px; width:20px; text-align:center;}
.navbtn:hover{background:rgba(255,255,255,.10);}
.navbtn.active{background:#fff; color:var(--brick-dark);}
.sidebar-foot{margin-top:auto; display:flex; flex-direction:column; gap:6px; padding-top:10px; border-top:1px solid rgba(255,255,255,.15);}
.userchip{padding:6px 8px; font-size:12.5px; opacity:.9; line-height:1.4;}
.userchip b{display:block; font-size:13.5px;}

.main{flex:1; min-width:0; padding:22px 26px 90px; max-width:1180px;}
.topbar{display:none;}
.view-head{display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:18px;}
.view-head p{color:var(--ink-soft); font-size:13.5px; margin:2px 0 0;}

.card{background:var(--paper); border:1.5px solid var(--line); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow);}
.section-title{font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); font-weight:700; margin-bottom:10px;}

/* ---------- Badges ---------- */
.badge{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; padding:4px 9px; border-radius:99px; text-transform:uppercase; letter-spacing:.02em; white-space:nowrap;}
.badge::before{content:''; width:6px; height:6px; border-radius:50%; background:currentColor;}
.badge-espera{background:#fbe4d8; color:#9a3d16;}
.badge-proceso{background:#fbeecb; color:#8a6408;}
.badge-listo{background:#e2f0da; color:#3a6b2b;}
.badge-barra{background:#dcebf5; color:#1f5a80;}
.badge-pagado{background:#e2f0da; color:#3a6b2b;}
.badge-pendiente{background:#fbe0de; color:#a4241b;}
.badge-admin{background:#f0dcf7;color:#7a2b91;}
.badge-mesero{background:#dcebf5;color:#1f5a80;}
.badge-cocinero{background:#fbeecb;color:#8a6408;}
.badge-cajero{background:#e2f0da;color:#3a6b2b;}

/* ---------- Pedidos view ---------- */
.order-grid{display:grid; grid-template-columns: 1.3fr 1fr; gap:18px; align-items:start;}
.prod-cats{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
.chip{padding:7px 14px; border-radius:99px; border:1.5px solid var(--line); background:#fff; font-size:13px; font-weight:600; color:var(--ink-soft);}
.chip.active{background:var(--ink); border-color:var(--ink); color:#fff;}
.prod-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:10px;}
.prod-tile{border:1.5px solid var(--line); background:#fff; border-radius:12px; padding:12px; text-align:left; transition:.12s;}
.prod-tile:hover{border-color:var(--brick); transform:translateY(-2px); box-shadow:var(--shadow);}
.prod-tile .pname{font-weight:700; font-size:14px; display:block;}
.prod-tile .pcat{font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em;}
.prod-tile .pprice{font-family:'IBM Plex Mono',monospace; color:var(--brick); font-weight:600; margin-top:6px; display:block;}
.cart-item{display:flex; align-items:flex-start; gap:8px; padding:10px 0; border-bottom:1px dashed var(--line);}
.cart-item:last-child{border-bottom:none;}
.cart-item .ci-main{flex:1; min-width:0;}
.cart-item .ci-name{font-weight:700; font-size:14px;}
.cart-item .ci-note{font-size:12px; color:var(--ink-soft); border:none; background:var(--bg-alt); border-radius:6px; padding:4px 6px; width:100%; margin-top:5px;}
.qty-ctrl{display:flex; align-items:center; gap:6px;}
.qty-ctrl button{width:24px; height:24px; border-radius:6px; border:1.5px solid var(--line); background:#fff; font-weight:700; line-height:1;}
.qty-ctrl span{min-width:18px; text-align:center; font-weight:700; font-family:'IBM Plex Mono',monospace;}
.ci-price{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13.5px; white-space:nowrap;}
.total-row{display:flex; justify-content:space-between; align-items:center; padding-top:12px; margin-top:8px; border-top:2px solid var(--ink); font-family:'Fraunces',serif;}
.total-row span:last-child{font-size:22px; font-weight:700; color:var(--brick);}
.empty-cart{padding:30px 10px; text-align:center; color:var(--ink-soft); font-size:13.5px;}

/* ---------- Kitchen tickets ---------- */
.ticket-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:16px;}
.ticket-card{background:var(--paper); border:1.5px solid var(--line); border-radius:12px; position:relative; overflow:hidden; box-shadow:var(--shadow);}
.ticket-card::before{content:''; position:absolute; top:0; left:0; right:0; height:8px;
  background-image: radial-gradient(circle, var(--bg) 4px, transparent 4.5px);
  background-size: 16px 16px; background-position:0 -4px;}
.ticket-head{padding:16px 16px 10px; border-bottom:1px dashed var(--line);}
.ticket-head .folio{font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:15px; color:var(--brick);}
.ticket-head .meta{font-size:12px; color:var(--ink-soft); margin-top:2px;}
.ticket-body{padding:12px 16px;}
.ticket-body ul{margin:0; padding:0; list-style:none;}
.ticket-body li{display:flex; justify-content:space-between; font-size:13.5px; padding:4px 0; gap:8px;}
.ticket-body li b{font-family:'IBM Plex Mono',monospace;}
.ticket-note{margin-top:8px; background:var(--bg-alt); border-radius:8px; padding:8px 10px; font-size:12.5px; color:var(--ink-soft);}
.status-rail{display:flex; align-items:center; gap:0; padding:14px 16px 4px;}
.status-rail .dot{width:11px; height:11px; border-radius:50%; background:var(--line); flex-shrink:0;}
.status-rail .seg{flex:1; height:3px; background:var(--line);}
.status-rail .dot.done, .status-rail .seg.done{background:var(--cilantro);}
.ticket-foot{display:flex; gap:8px; padding:10px 16px 16px;}

/* ---------- Caja ---------- */
.caja-grid{display:grid; grid-template-columns: 1fr 380px; gap:18px; align-items:start;}
.caja-row{display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border:1.5px solid var(--line); border-radius:12px; background:#fff; margin-bottom:10px; gap:10px; flex-wrap:wrap;}
.caja-row .cinfo{min-width:0;}
.caja-row .cinfo .cname{font-weight:700;}
.caja-row .cinfo .csub{font-size:12px; color:var(--ink-soft);}
.caja-row .camount{font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:16px; color:var(--brick);}
.pay-methods{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:12px 0;}
.pay-method{border:1.5px solid var(--line); border-radius:10px; padding:10px 6px; text-align:center; background:#fff; font-size:12.5px; font-weight:700;}
.pay-method.active{border-color:var(--brick); background:#fdece0;}
.split-row{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
.split-row input{flex:1;}

/* ---------- Tables ---------- */
table{width:100%; border-collapse:collapse; font-size:13.5px;}
table th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); padding:8px 10px; border-bottom:2px solid var(--ink);}
table td{padding:10px 10px; border-bottom:1px solid var(--line); vertical-align:middle;}
table tr:last-child td{border-bottom:none;}
.table-wrap{overflow-x:auto;}

/* ---------- Corte ---------- */
.stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:18px;}
.stat-card{background:var(--paper); border:1.5px solid var(--line); border-radius:14px; padding:16px; box-shadow:var(--shadow);}
.stat-card .slabel{font-size:11.5px; text-transform:uppercase; color:var(--ink-soft); font-weight:700; letter-spacing:.04em;}
.stat-card .sval{font-family:'IBM Plex Mono',monospace; font-size:24px; font-weight:600; color:var(--brick); margin-top:4px;}

/* ---------- Modal ---------- */
.modal-overlay{position:fixed; inset:0; background:rgba(30,17,8,.45); display:flex; align-items:center; justify-content:center; z-index:100; padding:16px;}
.modal{background:var(--paper); border-radius:18px; padding:24px; width:100%; max-width:460px; max-height:90vh; overflow:auto; box-shadow:0 20px 50px rgba(0,0,0,.3);}
.modal-wide{max-width:640px;}
.modal-close{float:right; background:none; border:none; font-size:20px; color:var(--ink-soft); line-height:1;}
.modal h2{margin-bottom:14px;}

/* ---------- Misc ---------- */
.tag-role{font-size:10px; text-transform:uppercase; font-weight:700; letter-spacing:.05em; padding:2px 7px; border-radius:99px;}
.flex-between{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
.muted{color:var(--ink-soft);}
.empty-state{text-align:center; padding:50px 20px; color:var(--ink-soft);}
.empty-state .ic{font-size:38px; display:block; margin-bottom:10px;}
.toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:12px 20px; border-radius:99px; font-size:13.5px; font-weight:600; box-shadow:var(--shadow); z-index:200; opacity:0; transition:.25s;}
.toast.show{opacity:1; transform:translateX(-50%) translateY(-4px);}
.hist-list{max-height:340px; overflow:auto;}
.hist-item{padding:9px 0; border-bottom:1px solid var(--line); font-size:13px;}
.hist-item .ht{font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace;}
.loading-overlay{position:fixed; inset:0; background:rgba(246,238,221,.85); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; font-family:'Fraunces',serif; font-size:20px; color:var(--brick); gap:12px;}

/* ---------- Responsive ---------- */
@media (max-width:960px){
  .order-grid, .caja-grid{grid-template-columns:1fr;}
}
@media (max-width:768px){
  .sidebar{display:none;}
  .app-shell{flex-direction:column;}
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    background:var(--brick); color:#fff; padding:14px 16px; position:sticky; top:0; z-index:20;
  }
  .topbar .brand{display:flex; align-items:center; gap:8px; font-family:'Fraunces',serif; font-weight:600; font-size:16px;}
  .main{padding:16px 14px 90px;}
  .bottomnav{
    position:fixed; bottom:0; left:0; right:0; background:var(--paper); border-top:1.5px solid var(--line);
    display:flex; z-index:20; padding:6px 4px calc(env(safe-area-inset-bottom,0px) + 4px);
    box-shadow:0 -4px 14px rgba(0,0,0,.08);
  }
  .bottomnav button{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none; padding:8px 2px; font-size:10.5px; font-weight:700; color:var(--ink-soft);}
  .bottomnav button.active{color:var(--brick);}
  .bottomnav button .ic{font-size:19px;}
  .pay-methods{grid-template-columns:1fr 1fr;}
}
@media print{
  body *{visibility:hidden;}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast"></div>

<script>
/* =========================================================================
   BIRRIA EXPRESS · Sistema de gestión de restaurante
   Base de datos: Google Sheets vía Apps Script Web App (Alojado en GitHub)
   ========================================================================= */

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyiiuaeOiXTxz_Os_MGAypE9rST24XLg-Vvc2os_mbE0vok9jlXxVU1gZj2nR1vCMCL/exec"; // <-- PEGA TU URL DE APPS SCRIPT AQUÍ
const SESSION_KEY = 'birriaSession_v1';
let dbCache = null;

function todayKey(d=new Date()){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function isoWeekKey(d=new Date()){
  const dt = new Date(d); const day = (dt.getDay()+6)%7;
  dt.setDate(dt.getDate()-day);
  return todayKey(dt);
}
function monthKey(d=new Date()){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function money(n){ return '$'+(Number(n)||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDateTime(iso){ const d=new Date(iso); return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function seedDB(){
  return {
    counters:{order:1, user:2, product:1},
    users:[{id:1, username:'Brian', password:'1234', name:'Brian', role:'admin'}],
    products:[
      {id:1, name:'Taco de birria', price:22, category:'Birria'},
      {id:2, name:'Orden de birria (3 tacos)', price:60, category:'Birria'},
      {id:3, name:'Quesabirria', price:28, category:'Birria'},
      {id:4, name:'Consomé chico', price:25, category:'Birria'},
      {id:5, name:'Consomé grande', price:45, category:'Birria'},
      {id:6, name:'Torta de birria', price:65, category:'Birria'},
      {id:7, name:'Gringa de birria', price:38, category:'Birria'},
      {id:8, name:'Refresco', price:20, category:'Bebidas'},
      {id:9, name:'Agua fresca', price:18, category:'Bebidas'},
      {id:10, name:'Cerveza', price:35, category:'Bebidas'},
      {id:11, name:'Extra tortillas', price:10, category:'Extras'},
      {id:12, name:'Extra cebolla/cilantro', price:5, category:'Extras'}
    ],
    orders:[], history:[], closures:[],
    cash:{date:null, initial:null, openedBy:null}
  };
}

async function loadDB(){
  if(dbCache) return dbCache;
  try{
    const res = await fetch(SCRIPT_URL + "?action=getDB");
    dbCache = await res.json();
    return dbCache;
  }catch(e){
    console.error(e);
    toast("Error conectando a Google Sheets");
    return seedDB();
  }
}

async function saveDB(db){
  dbCache = db;
  try{
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'saveDB', db })
    });
  }catch(e){
    console.error(e);
    toast("Error guardando en Google Sheets");
  }
}

function nextId(db, key){ const n = db.counters[key]||1; db.counters[key]=n+1; return n; }

function getSession(){ try{ return JSON.parse(sessionStorage.getItem(SESSION_KEY)); }catch(e){ return null; } }
function setSession(u){ sessionStorage.setItem(SESSION_KEY, JSON.stringify(u)); }
function clearSession(){ sessionStorage.removeItem(SESSION_KEY); }

async function logHistory(action, detail){
  const db = await loadDB();
  const s = getSession();
  db.history.unshift({id:uid(), ts:new Date().toISOString(), user:s?s.name:'—', role:s?s.role:'—', action, detail});
  if(db.history.length>500) db.history.length = 500;
  await saveDB(db);
}

function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(window.__toastTO); window.__toastTO=setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ---------- Roles ---------- */
const ROLE_LABEL = {admin:'Administrador', mesero:'Mesero', cocinero:'Cocinero', cajero:'Cajero'};
const ROLE_VIEWS = {
  admin:['pedidos','cocina','caja','productos','corte','usuarios'],
  mesero:['pedidos'],
  cocinero:['cocina'],
  cajero:['caja']
};
const VIEW_META = {
  pedidos:{label:'Pedidos', icon:'🧾'},
  cocina:{label:'Cocina', icon:'🍳'},
  caja:{label:'Caja', icon:'💵'},
  productos:{label:'Productos', icon:'📦'},
  corte:{label:'Corte', icon:'📊'},
  usuarios:{label:'Usuarios', icon:'👤'}
};

let state = {
  view: null,
  cart: [],
  customer:'',
  generalNotes:'',
  prodFilter:'Todos',
  cocinaFilter:'activos',
  cajaFilter:'pendientes',
  payDraft:null
};

/* =========================================================================
   RENDER: LOGIN
   ========================================================================= */
function renderLogin(){
  document.getElementById('root').innerHTML = `
  <div id="loginScreen">
    <div class="login-card">
      <div class="logo">🌶️</div>
      <h1>Birria Express</h1>
      <p class="tag">Control en la nube (Google Sheets)</p>
      <form id="loginForm">
        <div class="field">
          <label>Usuario</label>
          <input type="text" id="loginUser" autocomplete="username" required>
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="loginPass" autocomplete="current-password" required>
        </div>
        <div class="login-error" id="loginError"></div>
        <button class="btn btn-primary btn-block" type="submit">Entrar</button>
      </form>
      <div class="login-hint">Usuario por defecto: <b>Brian</b> / <b>1234</b></div>
    </div>
  </div>`;
  document.getElementById('loginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    const db = await loadDB();
    const user = db.users.find(x=>x.username.toLowerCase()===u.toLowerCase() && x.password===p);
    if(!user){
      document.getElementById('loginError').textContent = 'Usuario o contraseña incorrectos.';
      return;
    }
    setSession({id:user.id, name:user.name, username:user.username, role:user.role});
    await logHistory('Inicio de sesión', user.name+' ('+ROLE_LABEL[user.role]+') inició sesión');
    boot();
  });
}

/* =========================================================================
   SHELL / NAV
   ========================================================================= */
async function renderShell(){
  const s = getSession();
  const views = ROLE_VIEWS[s.role]||[];
  if(!state.view || !views.includes(state.view)) state.view = views[0];

  const navItems = views.map(v=>`
    <button class="navbtn ${state.view===v?'active':''}" onclick="goView('${v}')">
      <span class="ic">${VIEW_META[v].icon}</span> ${VIEW_META[v].label}
    </button>`).join('');

  const bottomItems = views.map(v=>`
    <button class="${state.view===v?'active':''}" onclick="goView('${v}')">
      <span class="ic">${VIEW_META[v].icon}</span>${VIEW_META[v].label}
    </button>`).join('');

  document.getElementById('root').innerHTML = `
  <div class="app-shell">
    <div class="sidebar">
      <div class="brand"><div class="logo">🌶️</div><div><strong>Birria Express</strong><span>Nube Sheets</span></div></div>
      ${navItems}
      <div class="sidebar-foot">
        <button class="navbtn" onclick="manualRefresh()"><span class="ic">🔄</span> Sincronizar</button>
        <div class="userchip"><b>${s.name}</b>${ROLE_LABEL[s.role]}</div>
        <button class="navbtn" onclick="doLogout()"><span class="ic">🚪</span> Salir</button>
      </div>
    </div>
    <div style="flex:1; min-width:0; display:flex; flex-direction:column;">
      <div class="topbar">
        <div class="brand">🌶️ Birria Express</div>
        <div style="display:flex; gap:6px;">
          <button class="btn btn-sm" style="background:rgba(255,255,255,.15);border-color:transparent;color:#fff;" onclick="manualRefresh()">🔄</button>
          <button class="btn btn-sm" style="background:rgba(255,255,255,.15);border-color:transparent;color:#fff;" onclick="doLogout()">🚪</button>
        </div>
      </div>
      <div class="main" id="mainView"></div>
    </div>
  </div>
  <div class="bottomnav">${bottomItems}</div>
  `;
  await renderView();
}

function goView(v){ state.view = v; state.cart=[]; state.customer=''; state.generalNotes=''; renderShell(); }
async function doLogout(){ await logHistory('Cierre de sesión', (getSession()||{}).name+' cerró sesión'); clearSession(); renderLogin(); }
async function manualRefresh(){
  dbCache = null;
  await loadDB();
  await renderView();
  toast('Sincronizado con Google Sheets');
}

async function renderView(){
  const el = document.getElementById('mainView');
  if(!el) return;
  const v = state.view;
  if(v==='pedidos') el.innerHTML = await viewPedidos();
  else if(v==='cocina') el.innerHTML = await viewCocina();
  else if(v==='caja') el.innerHTML = await viewCaja();
  else if(v==='productos') el.innerHTML = await viewProductos();
  else if(v==='corte') el.innerHTML = await viewCorte();
  else if(v==='usuarios') el.innerHTML = await viewUsuarios();
  afterRenderHooks();
}
function afterRenderHooks(){
  if(state.view==='pedidos') renderCart();
}

/* =========================================================================
   VIEW: PEDIDOS
   ========================================================================= */
async function viewPedidos(){
  const db = await loadDB();
  const cats = ['Todos', ...new Set(db.products.map(p=>p.category))];
  const chips = cats.map(c=>`<button class="chip ${state.prodFilter===c?'active':''}" onclick="setProdFilter('${c}')">${c}</button>`).join('');
  const prods = db.products.filter(p=> state.prodFilter==='Todos' || p.category===state.prodFilter);
  const tiles = prods.map(p=>`
    <button class="prod-tile" onclick="addToCart(${p.id})">
      <span class="pname">${p.name}</span>
      <span class="pcat">${p.category}</span>
      <span class="pprice">${money(p.price)}</span>
    </button>`).join('') || `<div class="empty-state" style="grid-column:1/-1">Sin productos en esta categoría.</div>`;

  return `
  <div class="view-head">
    <div><h2>Levantar pedido</h2><p>Selecciona productos, indica cantidades y envía a cocina y caja.</p></div>
  </div>
  <div class="order-grid">
    <div class="card">
      <div class="section-title">Menú</div>
      <div class="prod-cats">${chips}</div>
      <div class="prod-grid">${tiles}</div>
    </div>
    <div class="card">
      <div class="section-title">Datos del pedido</div>
      <div class="field">
        <label>Cliente / Mesa</label>
        <input type="text" id="custName" placeholder="Nombre del cliente o número de mesa" value="${state.customer}" oninput="state.customer=this.value">
      </div>
      <div id="cartWrap"></div>
      <div class="field" style="margin-top:10px;">
        <label>Notas generales del pedido</label>
        <textarea id="genNotes" rows="2" placeholder="Ej. para llevar, sin cebolla, etc." oninput="state.generalNotes=this.value">${state.generalNotes}</textarea>
      </div>
      <div class="field">
        <label>Tomado por</label>
        <input type="text" value="${getSession().name} (${ROLE_LABEL[getSession().role]})" disabled style="background:var(--bg-alt); color:var(--ink-soft);">
      </div>
      <button class="btn btn-primary btn-block" onclick="submitOrder()">Enviar a cocina y caja →</button>
    </div>
  </div>`;
}
function setProdFilter(c){ state.prodFilter=c; renderView(); }
async function addToCart(pid){
  const db = await loadDB();
  const p = db.products.find(x=>x.id===pid);
  if(!p) return;
  const existing = state.cart.find(i=>i.productId===pid);
  if(existing) existing.qty++;
  else state.cart.push({productId:pid, name:p.name, price:p.price, qty:1, notes:''});
  renderCart();
}
function changeQty(pid, delta){
  const item = state.cart.find(i=>i.productId===pid);
  if(!item) return;
  item.qty += delta;
  if(item.qty<=0) state.cart = state.cart.filter(i=>i.productId!==pid);
  renderCart();
}
function setItemNote(pid, val){ const item = state.cart.find(i=>i.productId===pid); if(item) item.notes = val; }
function renderCart(){
  const wrap = document.getElementById('cartWrap');
  if(!wrap) return;
  if(state.cart.length===0){
    wrap.innerHTML = `<div class="empty-cart">Aún no has agregado productos.<br>Toca un producto del menú para comenzar.</div>`;
    return;
  }
  const items = state.cart.map(i=>`
    <div class="cart-item">
      <div class="ci-main">
        <span class="ci-name">${i.name}</span>
        <input class="ci-note" placeholder="Nota opcional" value="${i.notes}" oninput="setItemNote(${i.productId}, this.value)">
      </div>
      <div class="qty-ctrl">
        <button onclick="changeQty(${i.productId},-1)">−</button>
        <span>${i.qty}</span>
        <button onclick="changeQty(${i.productId},1)">+</button>
      </div>
      <div class="ci-price">${money(i.price*i.qty)}</div>
    </div>`).join('');
  const total = state.cart.reduce((a,i)=>a+i.price*i.qty,0);
  wrap.innerHTML = items + `<div class="total-row"><span>Total</span><span>${money(total)}</span></div>`;
}
async function submitOrder(){
  if(state.cart.length===0){ toast('Agrega al menos un producto'); return; }
  const db = await loadDB();
  const s = getSession();
  const total = state.cart.reduce((a,i)=>a+i.price*i.qty,0);
  const order = {
    id: nextId(db,'order'),
    folio: 'B-'+String(db.counters.order-1).padStart(4,'0'),
    customer: state.customer.trim() || 'Cliente sin nombre',
    items: state.cart.map(i=>({...i})),
    generalNotes: state.generalNotes.trim(),
    waiterId: s.id, waiterName: s.name,
    status:'espera', paymentStatus:'pendiente',
    payments:[], total,
    createdAt: new Date().toISOString(),
    paidAt:null, paidBy:null
  };
  db.orders.unshift(order);
  await saveDB(db);
  await logHistory('Pedido creado', `${order.folio} · ${order.customer} · ${money(total)}`);
  state.cart=[]; state.customer=''; state.generalNotes='';
  toast('Pedido '+order.folio+' enviado');
  renderView();
}

/* =========================================================================
   VIEW: COCINA
   ========================================================================= */
const KITCHEN_STEPS = ['espera','proceso','listo','barra'];
const KITCHEN_LABEL = {espera:'En espera', proceso:'En proceso', listo:'Listo', barra:'En barra'};
async function viewCocina(){
  const db = await loadDB();
  let orders = [...db.orders];
  if(state.cocinaFilter==='activos') orders = orders.filter(o=>o.status!=='barra');
  orders.sort((a,b)=> new Date(a.createdAt)-new Date(b.createdAt));

  const cards = orders.map(o=>{
    const stepIdx = KITCHEN_STEPS.indexOf(o.status);
    const rail = KITCHEN_STEPS.map((st,i)=>{
      const dot = `<div class="dot ${i<=stepIdx?'done':''}"></div>`;
      const seg = i<KITCHEN_STEPS.length-1 ? `<div class="seg ${i<stepIdx?'done':''}"></div>` : '';
      return dot+seg;
    }).join('');
    const items = o.items.map(i=>`<li><span>${i.qty}x ${i.name}${i.notes?` <em class="muted">(${i.notes})</em>`:''}</span><b>${money(i.price*i.qty)}</b></li>`).join('');
    const nextStep = KITCHEN_STEPS[stepIdx+1];
    return `
    <div class="ticket-card">
      <div class="ticket-head">
        <div class="flex-between">
          <span class="folio">${o.folio}</span>
          <span class="badge badge-${o.status}">${KITCHEN_LABEL[o.status]}</span>
        </div>
        <div class="meta">Mesero: ${o.waiterName} · ${fmtDateTime(o.createdAt)}</div>
        <div class="meta">Cliente: ${o.customer}</div>
      </div>
      <div class="status-rail">${rail}</div>
      <div class="ticket-body">
        <ul>${items}</ul>
        ${o.generalNotes?`<div class="ticket-note">📝 ${o.generalNotes}</div>`:''}
      </div>
      <div class="ticket-foot">
        ${o.status!=='espera'?`<button class="btn btn-sm btn-ghost" onclick="setOrderStatus(${o.id}, '${KITCHEN_STEPS[stepIdx-1]}')">← Regresar</button>`:''}
        ${nextStep?`<button class="btn btn-sm btn-success btn-block" onclick="setOrderStatus(${o.id}, '${nextStep}')">Pasar a: ${KITCHEN_LABEL[nextStep]} →</button>`:`<span class="muted" style="font-size:12.5px;">✔ En barra</span>`}
      </div>
    </div>`;
  }).join('') || `<div class="empty-state"><span class="ic">🍲</span>No hay pedidos por preparar.</div>`;

  return `
  <div class="view-head">
    <div><h2>Cocina</h2><p>Pedidos enviados desde meseros.</p></div>
    <div class="prod-cats">
      <button class="chip ${state.cocinaFilter==='activos'?'active':''}" onclick="setCocinaFilter('activos')">Activos</button>
      <button class="chip ${state.cocinaFilter==='todos'?'active':''}" onclick="setCocinaFilter('todos')">Todos</button>
    </div>
  </div>
  <div class="ticket-grid">${cards}</div>`;
}
function setCocinaFilter(f){ state.cocinaFilter=f; renderView(); }
async function setOrderStatus(id, status){
  const db = await loadDB();
  const o = db.orders.find(x=>x.id===id);
  if(!o) return;
  o.status = status;
  await saveDB(db);
  await logHistory('Estatus cocina', `${o.folio} → ${KITCHEN_LABEL[status]}`);
  renderView();
}

/* =========================================================================
   VIEW: CAJA
   ========================================================================= */
async function viewCaja(){
  const db = await loadDB();
  let orders = [...db.orders];
  if(state.cajaFilter==='pendientes') orders = orders.filter(o=>o.paymentStatus==='pendiente');
  orders.sort((a,b)=> new Date(b.createdAt)-new Date(a.createdAt));

  const rows = orders.map(o=>`
    <div class="caja-row">
      <div class="cinfo">
        <div class="cname">${o.folio} · ${o.customer}</div>
        <div class="csub">Mesero: ${o.waiterName} · <span class="badge badge-${o.status}">${KITCHEN_LABEL[o.status]}</span> · ${fmtDateTime(o.createdAt)}</div>
      </div>
      <div class="camount">${money(o.total)}</div>
      <div style="display:flex; gap:6px;">
        <span class="badge badge-${o.paymentStatus}">${o.paymentStatus==='pagado'?'Pagado':'Pendiente'}</span>
        <button class="btn btn-sm" onclick="openTicket(${o.id})">Ticket</button>
        ${o.paymentStatus==='pendiente'?`<button class="btn btn-sm btn-primary" onclick="openPayModal(${o.id})">Cobrar</button>`:''}
      </div>
    </div>`).join('') || `<div class="empty-state"><span class="ic">💳</span>No hay cuentas en esta vista.</div>`;

  return `
  <div class="view-head">
    <div><h2>Caja</h2><p>Cobra pedidos y revisa tickets.</p></div>
    <div class="prod-cats">
      <button class="chip ${state.cajaFilter==='pendientes'?'active':''}" onclick="setCajaFilter('pendientes')">Pendientes</button>
      <button class="chip ${state.cajaFilter==='todos'?'active':''}" onclick="setCajaFilter('todos')">Todos</button>
    </div>
  </div>
  <div class="caja-grid">
    <div>${rows}</div>
    <div class="card">
      <div class="section-title">Resumen del día</div>
      ${cajaResumenHTML(db)}
    </div>
  </div>
  <div id="modalHost"></div>`;
}
function setCajaFilter(f){ state.cajaFilter=f; renderView(); }
function cajaResumenHTML(db){
  const tk = todayKey();
  const todays = db.orders.filter(o=>o.paymentStatus==='pagado' && todayKey(new Date(o.paidAt))===tk);
  const total = todays.reduce((a,o)=>a+o.total,0);
  const byMethod = {efectivo:0,tarjeta:0,transferencia:0};
  todays.forEach(o=> o.payments.forEach(p=> byMethod[p.method]+= p.amount));
  return `
  <div class="stat-card" style="margin-bottom:10px;"><div class="slabel">Ventas cobradas hoy</div><div class="sval">${money(total)}</div></div>
  <table>
    <tr><td>Efectivo</td><td style="text-align:right" class="mono">${money(byMethod.efectivo)}</td></tr>
    <tr><td>Tarjeta</td><td style="text-align:right" class="mono">${money(byMethod.tarjeta)}</td></tr>
    <tr><td>Transferencia</td><td style="text-align:right" class="mono">${money(byMethod.transferencia)}</td></tr>
  </table>`;
}

async function openPayModal(orderId){
  const db = await loadDB();
  const o = db.orders.find(x=>x.id===orderId);
  if(!o) return;
  state.payDraft = {orderId, splits:[{method:'efectivo', amount:o.total}]};
  renderPayModal();
}
async function renderPayModal(){
  const db = await loadDB();
  const d = state.payDraft;
  if(!d){ document.getElementById('modalHost').innerHTML=''; return; }
  const o = db.orders.find(x=>x.id===d.orderId);
  const paidSum = d.splits.reduce((a,s)=>a+ (Number(s.amount)||0),0);
  const remaining = +(o.total - paidSum).toFixed(2);
  const splitsHTML = d.splits.map((s,idx)=>`
    <div class="split-row">
      <select onchange="updateSplitMethod(${idx}, this.value)">
        <option value="efectivo" ${s.method==='efectivo'?'selected':''}>Efectivo</option>
        <option value="tarjeta" ${s.method==='tarjeta'?'selected':''}>Tarjeta</option>
        <option value="transferencia" ${s.method==='transferencia'?'selected':''}>Transferencia</option>
      </select>
      <input type="number" min="0" step="0.5" value="${s.amount}" oninput="updateSplitAmount(${idx}, this.value)">
      ${d.splits.length>1?`<button class="btn btn-sm btn-danger" onclick="removeSplit(${idx})">✕</button>`:''}
    </div>`).join('');

  document.getElementById('modalHost').innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closePayModal()">
    <div class="modal">
      <button class="modal-close" onclick="closePayModal()">✕</button>
      <h2>Cobrar ${o.folio}</h2>
      <p class="muted" style="margin-bottom:14px;">${o.customer} · Total: <b>${money(o.total)}</b></p>
      <div class="section-title">Formas de pago</div>
      ${splitsHTML}
      <button class="btn btn-sm" onclick="addSplit()">+ Dividir pago</button>
      <div class="total-row" style="margin-top:16px;">
        <span>${remaining===0?'Cuenta saldada':(remaining>0?'Falta por cobrar':'Cambio')}</span>
        <span style="color:${remaining===0?'var(--cilantro)':'var(--brick)'}">${money(Math.abs(remaining))}</span>
      </div>
      <button class="btn btn-primary btn-block" style="margin-top:14px;" ${remaining!==0?'disabled':''} onclick="confirmPayment()">Confirmar cobro</button>
    </div>
  </div>`;
}
function addSplit(){ state.payDraft.splits.push({method:'tarjeta', amount:0}); renderPayModal(); }
function removeSplit(i){ state.payDraft.splits.splice(i,1); renderPayModal(); }
function updateSplitMethod(i,v){ state.payDraft.splits[i].method=v; renderPayModal(); }
function updateSplitAmount(i,v){ state.payDraft.splits[i].amount = parseFloat(v)||0; renderPayModal(); }
function closePayModal(){ state.payDraft=null; document.getElementById('modalHost').innerHTML=''; }

async function confirmPayment(){
  const db = await loadDB();
  const d = state.payDraft;
  const o = db.orders.find(x=>x.id===d.orderId);
  o.paymentStatus='pagado';
  o.payments = d.splits.map(s=>({method:s.method, amount:Number(s.amount)||0}));
  o.paidAt = new Date().toISOString();
  o.paidBy = getSession().name;
  await saveDB(db);
  await logHistory('Cobro realizado', `${o.folio} · ${money(o.total)}`);
  toast('Pago registrado');
  closePayModal();
  renderView();
  openTicket(o.id);
}

async function openTicket(orderId){
  const db = await loadDB();
  const o = db.orders.find(x=>x.id===orderId);
  if(!o) return;
  const items = o.items.map(i=>`<li><span>${i.qty}x ${i.name}</span><b>${money(i.price*i.qty)}</b></li>`).join('');
  const pays = o.payments.length? `<div style="margin-top:6px;">${o.payments.map(p=>`<div style="display:flex;justify-content:space-between;"><span>${p.method}</span><b>${money(p.amount)}</b></div>`).join('')}</div>` : '';
  document.getElementById('modalHost').insertAdjacentHTML('beforeend', `
  <div class="modal-overlay" onclick="if(event.target===this) closeTicket()">
    <div class="modal" style="max-width:340px; font-family:'IBM Plex Mono',monospace;">
      <button class="modal-close" onclick="closeTicket()" style="font-family:'Figtree',sans-serif;">✕</button>
      <div style="text-align:center; margin-bottom:10px;">
        <h2 style="font-family:'Fraunces',serif;">Birria Express</h2>
        <div class="muted" style="font-size:12px;">${o.folio} · ${fmtDateTime(o.createdAt)}</div>
      </div>
      <div style="font-size:12.5px; border-top:1px dashed var(--line); border-bottom:1px dashed var(--line); padding:8px 0; margin-bottom:8px;">
        Cliente: ${o.customer}<br>Atendió: ${o.waiterName}
      </div>
      <ul style="list-style:none; padding:0; margin:0; font-size:13px;">${items}</ul>
      ${o.generalNotes?`<div class="muted" style="font-size:12px; margin-top:6px;">Notas: ${o.generalNotes}</div>`:''}
      <div class="total-row"><span>Total</span><span>${money(o.total)}</span></div>
      ${pays}
      <div class="muted" style="text-align:center; font-size:11px; margin-top:10px;">¡Gracias por su compra!</div>
      <button class="btn btn-primary btn-block" style="margin-top:14px; font-family:'Figtree',sans-serif;" onclick="printTicket(${o.id})">🖨️ Imprimir</button>
    </div>
  </div>`);
}
function closeTicket(){ const hosts = document.querySelectorAll('#modalHost .modal-overlay'); if(hosts.length) hosts[hosts.length-1].remove(); }

async function printTicket(orderId){
  const db = await loadDB();
  const o = db.orders.find(x=>x.id===orderId);
  const items = o.items.map(i=>`<div style="display:flex;justify-content:space-between;">${i.qty}x ${i.name}<b>${money(i.price*i.qty)}</b></div>`).join('');
  const pays = o.payments.map(p=>`<div style="display:flex;justify-content:space-between;">${p.method}<b>${money(p.amount)}</b></div>`).join('');
  const w = window.open('', '_blank', 'width=380,height=600');
  w.document.write(`<html><head><title>Ticket ${o.folio}</title>
  <style>body{font-family:monospace; padding:14px; font-size:13px;} h2{text-align:center;margin:0 0 4px;} .c{text-align:center;} hr{border:none;border-top:1px dashed #999;}</style>
  </head><body>
  <h2>Birria Express</h2>
  <div class="c">${o.folio} · ${fmtDateTime(o.createdAt)}</div>
  <hr>Cliente: ${o.customer}<br>Atendió: ${o.waiterName}<hr>
  ${items}
  ${o.generalNotes?'<hr>Notas: '+o.generalNotes:''}
  <hr><div style="display:flex;justify-content:space-between;font-weight:bold;">TOTAL<span>${money(o.total)}</span></div>
  <hr>${pays}
  <div class="c" style="margin-top:10px;">¡Gracias por su compra!</div>
  <script>window.onload=()=>{window.print();}<\/script>
  </body></html>`);
  w.document.close();
}

   VIEW: PRODUCTOS

async function openProductModal(pid){
  const db = await loadDB();
  const p = pid ? db.products.find(x=>x.id===pid) : {name:'', price:'', category:''};
  document.getElementById('modalHost').innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closeModalHost()">
    <div class="modal">
      <button class="modal-close" onclick="closeModalHost()">✕</button>
      <h2>${pid?'Editar producto':'Nuevo producto'}</h2>
      <div class="field"><label>Nombre</label><input id="pfName" value="${p.name}"></div>
      <div class="field"><label>Categoría</label><input id="pfCat" value="${p.category}" placeholder="Ej. Birria, Bebidas"></div>
      <div class="field"><label>Precio</label><input id="pfPrice" type="number" min="0" step="0.5" value="${p.price}"></div>
      <button class="btn btn-primary btn-block" onclick="saveProduct(${pid||'null'})">Guardar</button>
    </div>
  </div>`;
}

async function saveProduct(pid){
  const name = document.getElementById('pfName').value.trim();
  const cat = document.getElementById('pfCat').value.trim() || 'Otros';
  const price = parseFloat(document.getElementById('pfPrice').value)||0;
  if(!name){ toast('Escribe un nombre'); return; }
  const db = await loadDB();
  if(pid){
    const p = db.products.find(x=>x.id===pid);
    Object.assign(p, {name, category:cat, price});
    await logHistory('Producto editado', name);
  }else{
    const id = nextId(db,'product');
    db.products.push({id, name, category:cat, price});
    await logHistory('Producto creado', name);
  }
  await saveDB(db);
  closeModalHost();
  toast('Guardado');
  renderView();
}

async function deleteProduct(pid){
  const db = await loadDB();
  const p = db.products.find(x=>x.id===pid);
  if(!confirm('¿Eliminar "'+(p?p.name:'')+'"?')) return;
  db.products = db.products.filter(x=>x.id!==pid);
  await saveDB(db);
  await logHistory('Producto eliminado', p?p.name:'');
  toast('Eliminado');
  renderView();
}
function closeModalHost(){ const h=document.getElementById('modalHost'); if(h) h.innerHTML=''; }

/* =========================================================================
   VIEW: CORTE
   ========================================================================= */
function computeSales(db, filterFn){
  const paid = db.orders.filter(o=>o.paymentStatus==='pagado' && filterFn(new Date(o.paidAt)));
  const total = paid.reduce((a,o)=>a+o.total,0);
  const byMethod = {efectivo:0,tarjeta:0,transferencia:0};
  paid.forEach(o=>o.payments.forEach(p=>byMethod[p.method]+=p.amount));
  return {count:paid.length, total, byMethod};
}

async function viewCorte(){
  const db = await loadDB();
  const tk = todayKey();
  const dayS = computeSales(db, d=>todayKey(d)===tk);
  const weekS = computeSales(db, d=>isoWeekKey(d)===isoWeekKey());
  const monthS = computeSales(db, d=>monthKey(d)===monthKey());
  const cashOpen = db.cash.date===tk;
  const finalCash = (cashOpen? (Number(db.cash.initial)||0) : 0) + dayS.byMethod.efectivo;

  const closuresRows = [...db.closures].reverse().slice(0,10).map(c=>`
    <tr><td>${c.date}</td><td class="mono">${money(c.initialCash)}</td><td class="mono">${money(c.finalCash)}</td><td class="mono">${money(c.totalSales)}</td><td>${c.closedBy}</td></tr>
  `).join('') || `<tr><td colspan="5" class="empty-state">Sin cortes registrados.</td></tr>`;

  return `
  <div class="view-head">
    <div><h2>Corte de caja</h2><p>Control de caja y ventas en la nube.</p></div>
    <button class="btn" onclick="printReport()">📄 Reporte histórico</button>
  </div>

  <div class="card" style="margin-bottom:18px;">
    <div class="section-title">Caja del día</div>
    ${cashOpen? `
      <p>Caja inicial: <b class="mono">${money(db.cash.initial)}</b> (abierta por ${db.cash.openedBy})</p>
      <div class="stat-grid">
        <div class="stat-card"><div class="slabel">Caja inicial</div><div class="sval">${money(db.cash.initial)}</div></div>
        <div class="stat-card"><div class="slabel">Ventas en efectivo</div><div class="sval">${money(dayS.byMethod.efectivo)}</div></div>
        <div class="stat-card"><div class="slabel">Caja final estimada</div><div class="sval">${money(finalCash)}</div></div>
      </div>
      <button class="btn btn-primary" style="margin-top:10px;" onclick="realizarCorte()">Realizar corte de caja</button>
    ` : `
      <p class="muted">La caja de hoy no se ha abierto.</p>
      <div class="field" style="max-width:260px;"><label>Monto inicial</label><input id="initCash" type="number" min="0" step="0.5" value="0"></div>
      <button class="btn btn-primary" onclick="abrirCaja()">Abrir caja</button>
    `}
  </div>

  <div class="stat-grid">
    <div class="stat-card"><div class="slabel">Venta de hoy</div><div class="sval">${money(dayS.total)}</div></div>
    <div class="stat-card"><div class="slabel">Venta de la semana</div><div class="sval">${money(weekS.total)}</div></div>
    <div class="stat-card"><div class="slabel">Venta del mes</div><div class="sval">${money(monthS.total)}</div></div>
  </div>

  <div class="card">
    <div class="section-title">Historial de cortes</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Fecha</th><th>Caja inicial</th><th>Caja final</th><th>Total</th><th>Cerró</th></tr></thead>
      <tbody>${closuresRows}</tbody>
    </table></div>
  </div>`;
}

async function abrirCaja(){
  const val = parseFloat(document.getElementById('initCash').value)||0;
  const db = await loadDB();
  db.cash = {date:todayKey(), initial:val, openedBy:getSession().name};
  await saveDB(db);
  await logHistory('Apertura de caja', 'Inicial: '+money(val));
  toast('Caja abierta');
  renderView();
}

async function realizarCorte(){
  const db = await loadDB();
  const tk = todayKey();
  const dayS = computeSales(db, d=>todayKey(d)===tk);
  const finalCash = (Number(db.cash.initial)||0) + dayS.byMethod.efectivo;
  if(!confirm('¿Realizar el corte del día?')) return;
  db.closures.push({
    id:uid(), date:tk, initialCash:db.cash.initial, finalCash,
    totalSales:dayS.total, byMethod:dayS.byMethod, ordersCount:dayS.count,
    closedBy:getSession().name, ts:new Date().toISOString()
  });
  db.cash = {date:null, initial:null, openedBy:null};
  await saveDB(db);
  await logHistory('Corte realizado', `Venta: ${money(dayS.total)}`);
  toast('Corte realizado');
  renderView();
}

async function printReport(){
  const db = await loadDB();
  const rows = [...db.closures].reverse().map(c=>`
    <tr><td>${c.date}</td><td>${money(c.initialCash)}</td><td>${money(c.finalCash)}</td><td>${money(c.totalSales)}</td><td>${c.ordersCount}</td><td>${c.closedBy}</td></tr>`).join('') || '<tr><td colspan="6">Sin cortes</td></tr>';
  const w = window.open('', '_blank');
  w.document.write(`<html><head><title>Reporte</title><style>body{font-family:sans-serif;padding:20px;} table{width:100%;border-collapse:collapse;} td,th{border:1px solid #ccc;padding:6px;}</style></head>
  <body><h1>Birria Express — Histórico</h1><table><thead><tr><th>Fecha</th><th>Inicial</th><th>Final</th><th>Total</th><th>Pedidos</th><th>Cerró</th></tr></thead><tbody>${rows}</tbody></table>
  <script>window.onload=()=>window.print();<\/script></body></html>`);
  w.document.close();
}

/* =========================================================================
   VIEW: USUARIOS
   ========================================================================= */
async function viewUsuarios(){
  const db = await loadDB();
  const rows = db.users.map(u=>`
    <tr>
      <td>${u.name}</td>
      <td>${u.username}</td>
      <td><span class="badge badge-${u.role}">${ROLE_LABEL[u.role]}</span></td>
      <td style="text-align:right;">
        <button class="btn btn-sm" onclick="openUserModal(${u.id})">Editar</button>
        ${u.username==='Brian'?'':`<button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">Eliminar</button>`}
      </td>
    </tr>`).join('');
  const hist = db.history.slice(0,80).map(h=>`
    <div class="hist-item"><div class="ht">${fmtDateTime(h.ts)} · ${h.user}</div><div><b>${h.action}:</b> ${h.detail}</div></div>
  `).join('') || `<div class="empty-state">Sin movimientos.</div>`;

  return `
  <div class="view-head">
    <div><h2>Usuarios</h2><p>Control de accesos.</p></div>
    <button class="btn btn-primary" onclick="openUserModal()">+ Nuevo usuario</button>
  </div>
  <div class="card table-wrap" style="margin-bottom:18px;">
    <table><thead><tr><th>Nombre</th><th>Usuario</th><th>Rol</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div>
  <div class="card">
    <div class="section-title">Historial de movimientos</div>
    <div class="hist-list">${hist}</div>
  </div>
  <div id="modalHost"></div>`;
}

async function openUserModal(uidNum){
  const db = await loadDB();
  const u = uidNum ? db.users.find(x=>x.id===uidNum) : {name:'', username:'', password:'', role:'mesero'};
  document.getElementById('modalHost').innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this) closeModalHost()">
    <div class="modal">
      <button class="modal-close" onclick="closeModalHost()">✕</button>
      <h2>${uidNum?'Editar usuario':'Nuevo usuario'}</h2>
      <div class="field"><label>Nombre</label><input id="ufName" value="${u.name}"></div>
      <div class="field"><label>Usuario</label><input id="ufUser" value="${u.username}"></div>
      <div class="field"><label>Contraseña</label><input id="ufPass" type="text" value="${u.password}"></div>
      <div class="field"><label>Rol</label>
        <select id="ufRole">
          ${Object.keys(ROLE_LABEL).map(r=>`<option value="${r}" ${u.role===r?'selected':''}>${ROLE_LABEL[r]}</option>`).join('')}
        </select>
      </div>
      <button class="btn btn-primary btn-block" onclick="saveUser(${uidNum||'null'})">Guardar</button>
    </div>
  </div>`;
}

async function saveUser(uidNum){
  const name = document.getElementById('ufName').value.trim();
  const username = document.getElementById('ufUser').value.trim();
  const password = document.getElementById('ufPass').value;
  const role = document.getElementById('ufRole').value;
  if(!name || !username || !password){ toast('Completa los campos'); return; }
  const db = await loadDB();
  if(db.users.some(x=>x.username.toLowerCase()===username.toLowerCase() && x.id!==uidNum)){
    toast('El usuario ya existe'); return;
  }
  if(uidNum){
    const u = db.users.find(x=>x.id===uidNum);
    Object.assign(u, {name, username, password, role});
    await logHistory('Usuario editado', name);
  }else{
    const id = nextId(db,'user');
    db.users.push({id, name, username, password, role});
    await logHistory('Usuario creado', name);
  }
  await saveDB(db);
  closeModalHost();
  toast('Guardado');
  renderView();
}

async function deleteUser(uidNum){
  const db = await loadDB();
  const u = db.users.find(x=>x.id===uidNum);
  if(!confirm('¿Eliminar a '+(u?u.name:'')+'?')) return;
  db.users = db.users.filter(x=>x.id!==uidNum);
  await saveDB(db);
  await logHistory('Usuario eliminado', u?u.name:'');
  toast('Eliminado');
  renderView();
}

/* =========================================================================
   BOOT
   ========================================================================= */
async function boot(){
  const s = getSession();
  if(!s){ renderLogin(); return; }
  
  // Mostrar pantalla de carga inicial mientras descarga la DB de la nube
  document.getElementById('root').innerHTML = `<div class="loading-overlay"><div style="font-size:36px;">🌶️</div>Conectando a Google Sheets...</div>`;
  await loadDB();
  renderShell();
}

boot();
</script>
